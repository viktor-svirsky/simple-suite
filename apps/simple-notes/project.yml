name: SimpleNotes
options:
  bundleIdPrefix: com.simplesuite
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
  ReleaseCloudKit: release
packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.36.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "0.1.0"
targets:
  SimpleNotes:
    type: application
    platform: iOS
    sources:
      - path: SimpleNotes
    resources:
      - path: SimpleNotes/Resources/Assets.xcassets
    dependencies:
      - package: Sentry
    info:
      path: SimpleNotes/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: LaunchBg
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleDisplayName: simple notes
        SENTRY_DSN: $(SENTRY_DSN)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simplesuite.notes
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: SimpleNotes/Resources/SimpleNotes.entitlements
      configs:
        ReleaseCloudKit:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) SIMPLE_NOTES_CLOUDKIT_ENABLED
  SimpleNotesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SimpleNotesTests
    dependencies:
      - target: SimpleNotes
schemes:
  SimpleNotes:
    build:
      targets:
        SimpleNotes: all
        SimpleNotesTests: [test]
    test:
      targets:
        - SimpleNotesTests
      gatherCoverageData: true
