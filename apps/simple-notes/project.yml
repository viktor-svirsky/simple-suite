name: SimpleNotes
options:
  bundleIdPrefix: com.simplesuite
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  SimpleNotes:
    type: application
    platform: iOS
    sources:
      - path: SimpleNotes
    resources:
      - path: SimpleNotes/Resources/Assets.xcassets
    info:
      path: SimpleNotes/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleDisplayName: simple notes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simplesuite.notes
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  SimpleNotesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SimpleNotesTests
    dependencies:
      - target: SimpleNotes
schemes:
  SimpleNotes:
    build:
      targets:
        SimpleNotes: all
        SimpleNotesTests: [test]
    test:
      targets:
        - SimpleNotesTests
      gatherCoverageData: true
