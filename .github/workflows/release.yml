name: simple-notes Release

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'apps/simple-notes/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

concurrency:
  group: release-simple-notes
  cancel-in-progress: false

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       !startsWith(github.event.pull_request.title, 'chore:'))
    runs-on: macos-15
    permissions:
      contents: write
      pull-requests: write
      checks: write
    env:
      APP_DIR: apps/simple-notes
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: xcode-simple-notes-${{ runner.os }}-${{ hashFiles('apps/simple-notes/**/*.swift', 'apps/simple-notes/project.yml') }}
          restore-keys: |
            xcode-simple-notes-${{ runner.os }}-

      - name: Select latest Xcode
        run: |
          LATEST=$(find /Applications -maxdepth 1 -type d -name 'Xcode_*.app' | sort -V | tail -1)
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Determine version
        id: version
        working-directory: ${{ env.APP_DIR }}
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            NEW="$INPUT_VERSION"
            echo "bump=manual" >> "$GITHUB_OUTPUT"
          else
            # Use highest existing per-app tag as base, not VERSION file (avoids race
            # when two PRs merge before the housekeeping PR updates VERSION on main).
            CURRENT=$(git -C "$GITHUB_WORKSPACE" tag -l 'simple-notes-v*' \
              | sed 's/^simple-notes-v//' | sort -V | tail -1)
            if [ -z "$CURRENT" ]; then
              CURRENT=$(cat VERSION)
            fi
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

            if printf '%s' "$PR_TITLE" | grep -qiE '^feat(\(.*\))?!:|^[a-z]+(\(.*\))?!:|BREAKING CHANGE'; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
              echo "bump=major" >> "$GITHUB_OUTPUT"
            elif printf '%s' "$PR_TITLE" | grep -qiE '^feat(\(.*\))?:'; then
              MINOR=$((MINOR + 1)); PATCH=0
              echo "bump=minor" >> "$GITHUB_OUTPUT"
            elif printf '%s' "$PR_TITLE" | grep -qiE '^fix(\(.*\))?:'; then
              PATCH=$((PATCH + 1))
              echo "bump=patch" >> "$GITHUB_OUTPUT"
            else
              echo "bump=none" >> "$GITHUB_OUTPUT"
              echo "No version bump needed for: $PR_TITLE"
            fi

            NEW="${MAJOR}.${MINOR}.${PATCH}"
            echo "OLD_VERSION=$CURRENT" >> "$GITHUB_ENV"
          fi
          echo "VERSION=$NEW" >> "$GITHUB_ENV"
          echo "TAG=simple-notes-v$NEW" >> "$GITHUB_ENV"

      - name: Check if release already exists
        if: steps.version.outputs.bump != 'none'
        run: |
          if git ls-remote --tags origin "refs/tags/${{ env.TAG }}" | grep -q .; then
            echo "Tag ${{ env.TAG }} already exists, skipping."
            echo "SKIP_RELEASE=true" >> "$GITHUB_ENV"
          fi

      - name: Run tests
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        working-directory: ${{ env.APP_DIR }}
        run: make test VERSION=${{ env.VERSION }}

      - name: Build IPA (AltStore — Release, no iCloud)
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        working-directory: ${{ env.APP_DIR }}
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          make ipa CONFIG=Release VERSION=${{ env.VERSION }} SENTRY_DSN="$SENTRY_DSN"
          cp /tmp/SimpleNotes.ipa "$GITHUB_WORKSPACE/SimpleNotes.ipa"

      # Separate artifact for users who want iCloud sync. Must be signed with a
      # team that has the CloudKit container provisioned — the ad-hoc signed
      # build here is intended for internal/TestFlight paths, not AltStore.
      - name: Build IPA (CloudKit)
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        working-directory: ${{ env.APP_DIR }}
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          make ipa CONFIG=ReleaseCloudKit VERSION=${{ env.VERSION }} SENTRY_DSN="$SENTRY_DSN"
          cp /tmp/SimpleNotesCloudKit.ipa "$GITHUB_WORKSPACE/SimpleNotesCloudKit.ipa"

      - name: Create tag
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        run: |
          git tag "${{ env.TAG }}"
          git push origin "${{ env.TAG }}"

      - name: Create GitHub Release
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: simple-notes ${{ env.TAG }}
          files: |
            SimpleNotes.ipa
            SimpleNotesCloudKit.ipa
          generate_release_notes: true

      # Re-verify the published artifact by downloading it and checking the zip
      # header — catches CDN/upload corruption before AltStore points at it.
      # Associate this release with the Sentry project so issues surface "introduced in vX"
      # and unresolved errors tagged to prior releases auto-resolve when fixed. Also uploads
      # the dSYM so Sentry can symbolicate crashes from the sideloaded IPA. Skips silently
      # if SENTRY_AUTH_TOKEN isn't configured — can't reference secrets in `if:` directly,
      # so we gate in the shell.
      - name: Sentry release + dSYM
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: viktor-svirskyi
          SENTRY_PROJECT: simple-notes
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "::notice::SENTRY_AUTH_TOKEN not set — skipping Sentry release association"
            exit 0
          fi
          curl -sL https://sentry.io/get-cli/ | sh
          RELEASE="simple-notes@${{ env.VERSION }}"
          sentry-cli releases new "$RELEASE"
          sentry-cli releases set-commits --auto "$RELEASE" || true
          sentry-cli debug-files upload \
            --include-sources \
            /tmp/SimpleNotes.xcarchive/dSYMs \
            /tmp/SimpleNotesCloudKit.xcarchive/dSYMs || true
          sentry-cli releases finalize "$RELEASE"

      - name: Verify published bundle
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/release-verify
          gh release download "${{ env.TAG }}" -D /tmp/release-verify -p SimpleNotes.ipa --clobber
          gh release download "${{ env.TAG }}" -D /tmp/release-verify -p SimpleNotesCloudKit.ipa --clobber
          unzip -t /tmp/release-verify/SimpleNotes.ipa > /dev/null
          unzip -t /tmp/release-verify/SimpleNotesCloudKit.ipa > /dev/null

      # Private repo on the free plan has no branch protection, so push the
      # VERSION/altstore bump straight to main instead of opening a PR (which
      # would require the repo-level "Allow Actions to create PRs" toggle).
      - name: Push post-release bump to main
        if: steps.version.outputs.bump != 'none' && env.SKIP_RELEASE != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IPA_SIZE=$(stat -f%z SimpleNotes.ipa)
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ env.TAG }}/SimpleNotes.ipa"
          DATE=$(date -u +%Y-%m-%d)
          python3 - <<PY
          import json
          path = "$APP_DIR/altstore-source.json"
          with open(path) as f:
              source = json.load(f)
          new_version = {
              "version": "${{ env.VERSION }}",
              "date": "${DATE}",
              "downloadURL": "${DOWNLOAD_URL}",
              "size": ${IPA_SIZE},
              "localizedDescription": "Update to v${{ env.VERSION }}",
          }
          versions = source["apps"][0]["versions"]
          versions = [v for v in versions if v["version"] != "${{ env.VERSION }}"]
          versions.insert(0, new_version)
          # Cap history: AltStore only needs the recent tail.
          versions = versions[:5]
          source["apps"][0]["versions"] = versions
          with open(path, "w") as f:
              json.dump(source, f, indent=2)
              f.write("\n")
          PY

          echo "${{ env.VERSION }}" > "$APP_DIR/VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$APP_DIR/VERSION" "$APP_DIR/altstore-source.json"
          if git diff --cached --quiet; then
            echo "No VERSION/altstore changes to push."
            exit 0
          fi
          git commit -m "chore: release simple-notes v${{ env.VERSION }} — bump VERSION + update AltStore"
          # Rebase onto the latest main in case the release raced another push.
          git pull --rebase origin main
          git push origin HEAD:main
