name: iOS CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  simple-notes:
    name: simple-notes — build & test
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app || sudo xcode-select -s /Applications/Xcode_16.1.app || sudo xcode-select -s /Applications/Xcode_16.2.app
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apps/simple-notes
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project apps/simple-notes/SimpleNotes.xcodeproj \
            -scheme SimpleNotes \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild \
            -project apps/simple-notes/SimpleNotes.xcodeproj \
            -scheme SimpleNotes \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            test \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
